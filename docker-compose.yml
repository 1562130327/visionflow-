version: "3.9"

services:
  # ===== ComfyUI =====
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest
    ports:
      - "8188:8188"
    volumes:
      - comfyui_models:/workspace/ComfyUI/models
      - comfyui_output:/workspace/ComfyUI/output
      - comfyui_custom_nodes:/workspace/ComfyUI/custom_nodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  # ===== VisionFlow App =====
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - COMFYUI_HOST=comfyui
      - COMFYUI_PORT=8188
    depends_on:
      - comfyui
    volumes:
      - ./outputs:/app/outputs

  # ===== 基础设施（可选）=====
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: visionflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  comfyui_models:
  comfyui_output:
  comfyui_custom_nodes:
  pgdata:
  qdrantdata:
